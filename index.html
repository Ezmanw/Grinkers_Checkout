<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Checkout Launcher</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0D1610;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 800px;
}

.buttons {
  margin-top: 20px;
  display: flex;
  gap: 12px;
  justify-content: center;
}

a.button {
  padding: 12px 18px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: bold;
}

.primary {
  background: #81C784;
  color: #003314;
}

.tonal {
  background: #25502A;
  color: #C0F3C1;
}

.marquee {
  margin-top: 40px;
  overflow: hidden;
}

.track {
  display: flex;
  gap: 12px;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.item {
  font-size: 2rem;
  padding: 10px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Pick a page and jump in.</h1>
  <p>Use this as the front page for your checkout setup.</p>

  <div class="buttons">
    <a class="button primary" href="scanner.html">Checkout</a>
    <a class="button tonal" href="mobile.html">Mobile companion</a>
  </div>

  <div class="marquee">
    <div class="track" id="track"></div>
  </div>
</div>

<script>
const emojis = ['🍎','🥖','🥑','🧀','🥩','🥦','🥪','🥐','🍉','🍣','🍔','🍕','🌮','🍩','🥨','🥫','🍗','🍙','🍿','🥓'];

const track = document.getElementById('track');

// duplicate for smooth loop
track.innerHTML = [...emojis, ...emojis]
  .map(e => `<div class="item">${e}</div>`)
  .join('');
</script>

</body>
</html>
